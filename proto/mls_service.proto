syntax = "proto3";

package mls_service;

option go_package = "app/mls_service";

service MLSCryptoService {
  // ── Phase 2: Identity ──
  rpc Ping(PingRequest) returns (PingResponse);
  rpc GenerateIdentity(GenerateIdentityRequest) returns (GenerateIdentityResponse);
  rpc ExportIdentity(ExportIdentityRequest) returns (ExportIdentityResponse);
  rpc ImportIdentity(ImportIdentityRequest) returns (ImportIdentityResponse);

  // ── Phase 4: Group Operations ──
  rpc CreateGroup(CreateGroupRequest) returns (CreateGroupResponse);
  rpc CreateProposal(CreateProposalRequest) returns (CreateProposalResponse);
  rpc CreateCommit(CreateCommitRequest) returns (CreateCommitResponse);
  rpc ProcessCommit(ProcessCommitRequest) returns (ProcessCommitResponse);
  rpc ProcessWelcome(ProcessWelcomeRequest) returns (ProcessWelcomeResponse);
  rpc EncryptMessage(EncryptMessageRequest) returns (EncryptMessageResponse);
  rpc DecryptMessage(DecryptMessageRequest) returns (DecryptMessageResponse);
  rpc ExternalJoin(ExternalJoinRequest) returns (ExternalJoinResponse);
  rpc ExportSecret(ExportSecretRequest) returns (ExportSecretResponse);

  // Phase 4.1 — Add member / KeyPackage lifecycle
  rpc GenerateKeyPackage(GenerateKeyPackageRequest) returns (GenerateKeyPackageResponse);
  rpc AddMembers(AddMembersRequest) returns (AddMembersResponse);

  // Phase 6 — Group lifecycle: remove members. Targets are matched by
  // BasicCredential identity bytes (peer ID raw bytes). The Welcome field in
  // the response is empty for pure remove operations.
  rpc RemoveMembers(RemoveMembersRequest) returns (RemoveMembersResponse);
  // Query whether the given BasicCredential identity bytes are still a member
  // of the provided group_state. Used by Go coordinator to detect if local
  // node has been removed after applying a commit.
  rpc HasMember(HasMemberRequest) returns (HasMemberResponse);
  // Enumerate every BasicCredential identity currently sitting on a leaf of
  // the MLS tree. Used by the Go runtime after JoinGroupWithWelcome (and on
  // every GetGroupMembers refresh) to reconstruct the full roster directly
  // from cryptographic ground truth, independent of which node sent the
  // Welcome. Order matches the leaf-index iteration order returned by the
  // OpenMLS group; the response is empty when group_state is uninitialized.
  rpc ListMemberIdentities(ListMemberIdentitiesRequest) returns (ListMemberIdentitiesResponse);

  // Phase 4.5 — Fork healing: winning branch exports its current GroupInfo so a
  // losing-branch peer can re-join via ExternalJoin. The exported MlsMessage is
  // TLS-serialized and contains the RatchetTree extension when with_ratchet_tree=true.
  rpc ExportGroupInfo(ExportGroupInfoRequest) returns (ExportGroupInfoResponse);

  // Phase A optimization research — hot-cache sidecar benchmark path.
  // These RPCs are additive and do not replace the production stateless RPCs.
  rpc LoadGroup(LoadGroupRequest) returns (LoadGroupResponse);
  rpc GetGroupMetadata(GetGroupMetadataRequest) returns (GetGroupMetadataResponse);
  rpc EncryptMessageCached(EncryptMessageCachedRequest) returns (EncryptMessageCachedResponse);
  rpc DecryptMessageCached(DecryptMessageCachedRequest) returns (DecryptMessageCachedResponse);
  rpc CreateUpdateCommitCached(CreateUpdateCommitCachedRequest) returns (CreateUpdateCommitCachedResponse);
  rpc ProcessCommitCached(ProcessCommitCachedRequest) returns (ProcessCommitCachedResponse);
  rpc ExportSecretCached(ExportSecretCachedRequest) returns (ExportSecretCachedResponse);
  rpc ExportGroupStateCheckpoint(ExportGroupStateCheckpointRequest) returns (ExportGroupStateCheckpointResponse);
  rpc UnloadGroup(UnloadGroupRequest) returns (UnloadGroupResponse);
}

// ── Phase 2 Messages ──

message PingRequest {}
message PingResponse {
  string message = 1;
  int64 timestamp = 2;
}

message GenerateIdentityRequest {
  string display_name = 1;
}

message GenerateIdentityResponse {
  bytes signing_key_private = 1;
  bytes public_key = 2;
  bytes credential = 3;
}

message ExportIdentityRequest {
  bytes key_package = 1;
  string passphrase = 2;
}

message ExportIdentityResponse {
  bytes encrypted_backup_data = 1;
}

message ImportIdentityRequest {
  bytes encrypted_backup_data = 1;
  string passphrase = 2;
}

message ImportIdentityResponse {
  bytes key_package = 1;
}

// ── Phase 4 Enum ──

enum MlsProposalType {
  PROPOSAL_ADD = 0;
  PROPOSAL_REMOVE = 1;
  PROPOSAL_UPDATE = 2;
}

// ── Phase 4 Messages ──

message CreateGroupRequest {
  string group_id = 1;
  bytes signing_key = 2;
}

message CreateGroupResponse {
  bytes group_state = 1;
  bytes tree_hash = 2;
}

message CreateProposalRequest {
  bytes group_state = 1;
  MlsProposalType proposal_type = 2;
  bytes data = 3;
}

message CreateProposalResponse {
  bytes proposal_bytes = 1;
}

message CreateCommitRequest {
  bytes group_state = 1;
  repeated bytes proposals = 2;
}

message CreateCommitResponse {
  bytes commit_bytes = 1;
  bytes welcome_bytes = 2;
  bytes new_group_state = 3;
  bytes new_tree_hash = 4;
}

message ProcessCommitRequest {
  bytes group_state = 1;
  bytes commit_bytes = 2;
}

message ProcessCommitResponse {
  bytes new_group_state = 1;
  bytes new_tree_hash = 2;
}

message ProcessWelcomeRequest {
  bytes welcome_bytes = 1;
  bytes signing_key = 2;
  // Same blob returned from GenerateKeyPackage.key_package_bundle_private
  bytes key_package_bundle_private = 3;
}

message ProcessWelcomeResponse {
  bytes group_state = 1;
  bytes tree_hash = 2;
  uint64 epoch = 3;
}

message EncryptMessageRequest {
  bytes group_state = 1;
  bytes plaintext = 2;
}

message EncryptMessageResponse {
  bytes ciphertext = 1;
  bytes new_group_state = 2;
}

message DecryptMessageRequest {
  bytes group_state = 1;
  bytes ciphertext = 2;
}

message DecryptMessageResponse {
  bytes plaintext = 1;
  bytes new_group_state = 2;
}

message ExternalJoinRequest {
  bytes group_info = 1;
  bytes signing_key = 2;
}

message ExternalJoinResponse {
  bytes group_state = 1;
  bytes commit_bytes = 2;
  bytes tree_hash = 3;
}

message ExportSecretRequest {
  bytes group_state = 1;
  string label = 2;
  uint32 length = 3;
  // RFC 9420 exporter context (e.g. SHA-256 digest of plaintext file for Phase 8).
  // Empty bytes preserve legacy behavior (same as zero-length context).
  bytes context = 4;
}

message ExportSecretResponse {
  bytes secret = 1;
}

message GenerateKeyPackageRequest {
  bytes signing_key = 1;
}

message GenerateKeyPackageResponse {
  bytes key_package_bytes = 1;
  // Opaque blob (JSON) — invitee must retain until ProcessWelcome; never share OOB.
  bytes key_package_bundle_private = 2;
}

message AddMembersRequest {
  bytes group_state = 1;
  repeated bytes key_packages = 2;
}

message AddMembersResponse {
  bytes commit_bytes = 1;
  bytes welcome_bytes = 2;
  bytes new_group_state = 3;
  bytes new_tree_hash = 4;
}

message RemoveMembersRequest {
  bytes group_state = 1;
  // Each entry is the raw identity bytes of one BasicCredential to remove
  // (MLS signing public-key bytes in this application). Order is irrelevant; a single
  // commit bundles all removals atomically.
  repeated bytes target_identities = 2;
}

message RemoveMembersResponse {
  bytes commit_bytes = 1;
  bytes new_group_state = 2;
  bytes new_tree_hash = 3;
}

message HasMemberRequest {
  bytes group_state = 1;
  bytes identity = 2;
}

message HasMemberResponse {
  bool is_member = 1;
}

message ListMemberIdentitiesRequest {
  bytes group_state = 1;
}

message ListMemberIdentitiesResponse {
  // BasicCredential identity bytes (raw signing public-key bytes in this app)
  // for every leaf currently present in the MLS tree.
  repeated bytes identities = 1;
}

message ExportGroupInfoRequest {
  bytes group_state = 1;
  // When true (recommended for fork healing), the exported GroupInfo embeds
  // a RatchetTreeExtension so the receiver can ExternalJoin without a
  // separate ratchet tree exchange.
  bool with_ratchet_tree = 2;
}

message ExportGroupInfoResponse {
  // TLS-serialized MlsMessageOut containing GroupInfo (signed by exporter).
  bytes group_info = 1;
}

// ── Phase A Optimization Research Messages ──

message OperationContext {
  string group_id = 1;
  uint64 expected_epoch = 2;
  uint64 expected_state_version = 3;
  string operation_id = 4;
}

message LoadGroupRequest {
  string group_id = 1;
  bytes group_state = 2;
  uint64 state_version = 3;
}

message LoadGroupResponse {
  string group_id = 1;
  uint64 epoch = 2;
  uint64 state_version = 3;
  bytes tree_hash = 4;
  uint64 state_size_bytes = 5;
}

message GetGroupMetadataRequest {
  string group_id = 1;
}

message GetGroupMetadataResponse {
  string group_id = 1;
  uint64 epoch = 2;
  uint64 state_version = 3;
  bytes tree_hash = 4;
  bool dirty = 5;
  uint64 state_size_bytes = 6;
}

message EncryptMessageCachedRequest {
  OperationContext context = 1;
  bytes plaintext = 2;
}

message EncryptMessageCachedResponse {
  bytes ciphertext = 1;
  uint64 epoch = 2;
  uint64 state_version = 3;
}

message DecryptMessageCachedRequest {
  OperationContext context = 1;
  bytes ciphertext = 2;
}

message DecryptMessageCachedResponse {
  bytes plaintext = 1;
  uint64 epoch = 2;
  uint64 state_version = 3;
}

message CreateUpdateCommitCachedRequest {
  OperationContext context = 1;
}

message CreateUpdateCommitCachedResponse {
  bytes commit_bytes = 1;
  bytes tree_hash = 2;
  uint64 epoch = 3;
  uint64 state_version = 4;
}

message ProcessCommitCachedRequest {
  OperationContext context = 1;
  bytes commit_bytes = 2;
}

message ProcessCommitCachedResponse {
  bytes tree_hash = 1;
  uint64 epoch = 2;
  uint64 state_version = 3;
}

message ExportSecretCachedRequest {
  OperationContext context = 1;
  string label = 2;
  uint32 length = 3;
  bytes exporter_context = 4;
}

message ExportSecretCachedResponse {
  bytes secret = 1;
  uint64 epoch = 2;
  uint64 state_version = 3;
}

message ExportGroupStateCheckpointRequest {
  string group_id = 1;
}

message ExportGroupStateCheckpointResponse {
  bytes group_state = 1;
  bytes tree_hash = 2;
  uint64 epoch = 3;
  uint64 state_version = 4;
  uint64 state_size_bytes = 5;
}

message UnloadGroupRequest {
  string group_id = 1;
}

message UnloadGroupResponse {
  bool unloaded = 1;
}
