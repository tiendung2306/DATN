syntax = "proto3";

package mls_service;

option go_package = "app/mls_service";

service MLSCryptoService {
  // ── Phase 2: Identity ──
  rpc Ping(PingRequest) returns (PingResponse);
  rpc GenerateIdentity(GenerateIdentityRequest) returns (GenerateIdentityResponse);
  rpc ExportIdentity(ExportIdentityRequest) returns (ExportIdentityResponse);
  rpc ImportIdentity(ImportIdentityRequest) returns (ImportIdentityResponse);

  // ── Phase 4: Group Operations ──
  rpc CreateGroup(CreateGroupRequest) returns (CreateGroupResponse);
  rpc CreateProposal(CreateProposalRequest) returns (CreateProposalResponse);
  rpc CreateCommit(CreateCommitRequest) returns (CreateCommitResponse);
  rpc ProcessCommit(ProcessCommitRequest) returns (ProcessCommitResponse);
  rpc ProcessWelcome(ProcessWelcomeRequest) returns (ProcessWelcomeResponse);
  rpc EncryptMessage(EncryptMessageRequest) returns (EncryptMessageResponse);
  rpc DecryptMessage(DecryptMessageRequest) returns (DecryptMessageResponse);
  rpc ExternalJoin(ExternalJoinRequest) returns (ExternalJoinResponse);
  rpc ExportSecret(ExportSecretRequest) returns (ExportSecretResponse);
}

// ── Phase 2 Messages ──

message PingRequest {}
message PingResponse {
  string message = 1;
  int64 timestamp = 2;
}

message GenerateIdentityRequest {
  string display_name = 1;
}

message GenerateIdentityResponse {
  bytes signing_key_private = 1;
  bytes public_key = 2;
  bytes credential = 3;
}

message ExportIdentityRequest {
  bytes key_package = 1;
  string passphrase = 2;
}

message ExportIdentityResponse {
  bytes encrypted_backup_data = 1;
}

message ImportIdentityRequest {
  bytes encrypted_backup_data = 1;
  string passphrase = 2;
}

message ImportIdentityResponse {
  bytes key_package = 1;
}

// ── Phase 4 Enum ──

enum MlsProposalType {
  PROPOSAL_ADD = 0;
  PROPOSAL_REMOVE = 1;
  PROPOSAL_UPDATE = 2;
}

// ── Phase 4 Messages ──

message CreateGroupRequest {
  string group_id = 1;
  bytes signing_key = 2;
}

message CreateGroupResponse {
  bytes group_state = 1;
  bytes tree_hash = 2;
}

message CreateProposalRequest {
  bytes group_state = 1;
  MlsProposalType proposal_type = 2;
  bytes data = 3;
}

message CreateProposalResponse {
  bytes proposal_bytes = 1;
}

message CreateCommitRequest {
  bytes group_state = 1;
  repeated bytes proposals = 2;
}

message CreateCommitResponse {
  bytes commit_bytes = 1;
  bytes welcome_bytes = 2;
  bytes new_group_state = 3;
  bytes new_tree_hash = 4;
}

message ProcessCommitRequest {
  bytes group_state = 1;
  bytes commit_bytes = 2;
}

message ProcessCommitResponse {
  bytes new_group_state = 1;
  bytes new_tree_hash = 2;
}

message ProcessWelcomeRequest {
  bytes welcome_bytes = 1;
  bytes signing_key = 2;
}

message ProcessWelcomeResponse {
  bytes group_state = 1;
  bytes tree_hash = 2;
}

message EncryptMessageRequest {
  bytes group_state = 1;
  bytes plaintext = 2;
}

message EncryptMessageResponse {
  bytes ciphertext = 1;
  bytes new_group_state = 2;
}

message DecryptMessageRequest {
  bytes group_state = 1;
  bytes ciphertext = 2;
}

message DecryptMessageResponse {
  bytes plaintext = 1;
  bytes new_group_state = 2;
}

message ExternalJoinRequest {
  bytes group_info = 1;
  bytes signing_key = 2;
}

message ExternalJoinResponse {
  bytes group_state = 1;
  bytes commit_bytes = 2;
  bytes tree_hash = 3;
}

message ExportSecretRequest {
  bytes group_state = 1;
  string label = 2;
  uint32 length = 3;
}

message ExportSecretResponse {
  bytes secret = 1;
}
